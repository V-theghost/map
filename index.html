<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ================================================
       EDIT THESE VALUES
       ================================================ -->
  <meta property="og:image"       content="YOUR_IMAGE.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:title"       content="My Image" />
  <meta property="og:description" content="" />
  <meta property="og:type"        content="website" />

  <!-- Twitter / X also reads these -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:image"       content="YOUR_IMAGE.png" />
  <!-- ================================================ -->

  <title>Image Embed</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    img {
      max-width: 100%;
      max-height: 100vh;
      display: block;
    }
  </style>
</head>
<body>

  <img src="YOUR_IMAGE.png" alt="" />

</body>
</html>
